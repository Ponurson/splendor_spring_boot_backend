# Production profile: every credential and secret is required from the environment.
# No defaults on purpose - startup fails fast if any of these are missing.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:${SPRING_DATASOURCE_INITIALIZATION_MODE:never}}
server.servlet.session.timeout=${APP_SESSION_TIMEOUT}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.jwt.signing-secret=${JWT_SIGNING_SECRET}
