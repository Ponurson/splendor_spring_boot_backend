# Local development profile: in-memory H2, no external database or secrets required.
# `mvn spring-boot:run` (or running the app with no env vars) works out of the box.
spring.datasource.url=jdbc:h2:mem:splendor;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
server.servlet.session.timeout=30m
app.cors.allowed-origins=http://localhost:4200
# Non-secret placeholder; production supplies a real value from the environment.
app.jwt.signing-secret=dev-insecure-not-for-production
