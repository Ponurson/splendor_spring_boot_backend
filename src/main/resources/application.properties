# Base config shared by all profiles. No credentials or secrets live here.
# Local runs default to the `dev` profile (in-memory H2, zero manual setup);
# containers set SPRING_PROFILES_ACTIVE=prod to require real credentials from the environment.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.jpa.defer-datasource-initialization=true
spring.jackson.deserialization.fail-on-null-for-primitives=false
#spring.jpa.show-sql=true
